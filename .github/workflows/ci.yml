name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest

      - name: Validate JSON schemas
        run: |
          python -m json.tool schemas/v0.1.0/manifest.schema.json > /dev/null
          python -m json.tool schemas/record.schema.json > /dev/null

      - name: Validate, pack, unpack, and revalidate every example and template
        run: python3 tools/ci_check_examples.py
