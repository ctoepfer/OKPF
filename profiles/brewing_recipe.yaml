id: brewing_recipe
name: Brewing Recipe Knowledge
description: Convert brewing recipes, notes, and articles into structured OKPF records.
domain: brewing

target_brains:
  - recipes

input_types:
  - md
  - txt
  - pdf
  - xml
  - beerxml

output:
  format: okpf
  okpf_version: "0.1.0"
  package_type: knowledge_pack

allowed_record_types:
  - recipe
  - ingredient_reference
  - process_note
  - style_guideline
  - troubleshooting_note
  - equipment_note

chunking:
  strategy: section-aware
  max_chars: 12000
  overlap_chars: 500

conversion:
  preserve_source_text: true
  require_source_refs: true
  summarize_long_sections: true
  confidence_required: true

validation:
  record_type_policy: strict

prompt:
  system: |
    You convert source material into clean OKPF training records.
    Preserve provenance. Do not invent facts.
    Respond with valid JSON only — no markdown fences, no explanation.
  instructions: |
    Extract useful brewing knowledge from the source text provided.
    Use only the allowed record types listed below.
    Include source references when possible.
    Each record should contain a title, summary, and content.
    Assign a confidence score between 0.0 and 1.0 based on how clearly
    the source text supports the extracted information.
