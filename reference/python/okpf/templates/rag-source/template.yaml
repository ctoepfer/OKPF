# $comment: SPDX-License-Identifier: Apache-2.0 | Copyright 2026 OKPF Contributors
id: rag-source
name: RAG Source Pack
description: A single source document plus pre-chunked records, ready for RAG ingestion.
recommended_domain: general
variables:
  package_id:
    prompt: "Package ID"
    default: "org.example.rag-source"
  name:
    prompt: "Package name"
    default: "RAG Source Pack"
  domain:
    prompt: "Domain"
    default: "general"
  creator_name:
    prompt: "Creator name"
    default: "Example Maintainer"
  license_type:
    prompt: "License"
    default: "CC-BY-4.0"
  version:
    prompt: "Version"
    default: "0.1.0"
